name: Build macOS app

# 코드를 올리거나(main 브랜치), Actions 탭에서 수동 실행하면
# GitHub의 macOS(Apple Silicon) 서버가 .dmg 를 만들어 줍니다.
on:
  push:
    branches: [main]
  workflow_dispatch: # Actions 탭에서 버튼으로 수동 실행

jobs:
  build-mac:
    runs-on: macos-14 # Apple Silicon(arm64) 러너
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        run: npm install

      # 서명 없이 .app 형태로만 빌드 (서명은 다음 단계에서 직접)
      - name: 앱 빌드 (.app)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --arm64 --dir

      # 내부 모든 Mach-O 바이너리 → 프레임워크 → 헬퍼 앱 → 메인 앱 순서로 전부 ad-hoc 재서명.
      # (electron-builder의 퓨즈 수정/이름 변경으로 깨진 서명을 안쪽부터 모두 복구)
      - name: ad-hoc 코드 서명
        run: |
          APP=$(ls -d dist/mac-arm64/*.app)
          echo "서명 대상: $APP"
          # 1) Frameworks 내부의 모든 Mach-O 파일 (dylib, .node, 프레임워크/헬퍼 바이너리, crashpad 등)
          find "$APP/Contents/Frameworks" -type f | while read -r f; do
            if file "$f" | grep -q "Mach-O"; then
              codesign --force --sign - "$f"
            fi
          done
          # 2) 프레임워크 번들 재봉인
          for fw in "$APP/Contents/Frameworks/"*.framework; do
            codesign --force --sign - "$fw"
          done
          # 3) 헬퍼 앱 번들 재봉인
          for helper in "$APP/Contents/Frameworks/"*.app; do
            codesign --force --sign - "$helper"
          done
          # 4) 메인 실행 파일 & 최상위 앱
          for m in "$APP/Contents/MacOS/"*; do
            codesign --force --sign - "$m"
          done
          codesign --force --sign - "$APP"

      # 서명이 실제로 유효한지 검증 (깨졌으면 여기서 빌드 실패 → 바로 알 수 있음)
      - name: 서명 검증
        run: |
          APP=$(ls -d dist/mac-arm64/*.app)
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "✅ 서명 유효"

      # 서명된 .app 으로 .dmg 생성 (응용 프로그램 폴더 바로가기 포함)
      - name: DMG 생성
        run: |
          APP=$(ls -d dist/mac-arm64/*.app)
          mkdir -p dmg-stage
          cp -R "$APP" dmg-stage/
          ln -s /Applications "dmg-stage/Applications"
          hdiutil create -volname "노래방" -srcfolder dmg-stage -ov -format UDZO "dist/노래방-arm64.dmg"

      - name: .dmg 업로드 (다운로드용 결과물)
        uses: actions/upload-artifact@v4
        with:
          name: noraebang-mac-arm64
          path: dist/*.dmg
          if-no-files-found: error
