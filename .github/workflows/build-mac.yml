name: Build macOS app

# 코드를 올리거나(main 브랜치), Actions 탭에서 수동 실행하면
# GitHub의 macOS(Apple Silicon) 서버가 .dmg 를 만들어 줍니다.
on:
  push:
    branches: [main]
  workflow_dispatch: # Actions 탭에서 버튼으로 수동 실행

jobs:
  build-mac:
    runs-on: macos-14 # Apple Silicon(arm64) 러너
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        run: npm install

      # dmg가 아니라 앱(.app) 폴더 형태로만 먼저 빌드 (서명은 다음 단계에서)
      - name: 앱 빌드 (.app)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --arm64 --dir

      # Apple Silicon은 서명 없으면 "손상됨"으로 차단됨 → ad-hoc 서명을 넣어준다
      - name: ad-hoc 코드 서명
        run: |
          APP=$(ls -d dist/mac-arm64/*.app)
          echo "서명할 앱: $APP"
          codesign --force --deep --sign - "$APP"
          codesign --verify --verbose=2 "$APP" || true

      # 서명된 .app 으로 .dmg 만들기
      - name: DMG 생성
        run: |
          APP=$(ls -d dist/mac-arm64/*.app)
          hdiutil create -volname "노래방" -srcfolder "$APP" -ov -format UDZO "dist/노래방-arm64.dmg"

      - name: .dmg 업로드 (다운로드용 결과물)
        uses: actions/upload-artifact@v4
        with:
          name: noraebang-mac-arm64
          path: dist/*.dmg
          if-no-files-found: error
