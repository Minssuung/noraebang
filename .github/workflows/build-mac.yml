name: Build macOS app

# 코드를 올리거나(main 브랜치), Actions 탭에서 수동 실행하면
# GitHub의 macOS(Apple Silicon) 서버가 .dmg 를 만들어 줍니다.
on:
  push:
    branches: [main]
  workflow_dispatch: # Actions 탭에서 버튼으로 수동 실행

jobs:
  build-mac:
    runs-on: macos-14 # Apple Silicon(arm64) 러너
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        run: npm install

      # electron-builder 가 직접 ad-hoc 서명(identity "-")까지 하고 .dmg 생성
      # (내부 헬퍼/프레임워크를 올바른 순서로 서명 → "손상됨" 방지)
      - name: macOS 앱(.dmg) 빌드
        run: npm run dist:mac

      # 서명이 실제로 유효한지 검증 (깨졌으면 여기서 빌드 실패시킴)
      - name: 서명 검증
        run: |
          APP=$(ls -d dist/mac-arm64/*.app)
          echo "검증할 앱: $APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "--- codesign 정보 ---"
          codesign -dvvv "$APP" 2>&1 | grep -Ei "Signature|Identifier|TeamIdentifier|flags" || true
          echo "--- Gatekeeper 평가 (ad-hoc은 거부가 정상, 참고용) ---"
          spctl -a -vvv "$APP" 2>&1 || true

      - name: .dmg 업로드 (다운로드용 결과물)
        uses: actions/upload-artifact@v4
        with:
          name: noraebang-mac-arm64
          path: dist/*.dmg
          if-no-files-found: error
